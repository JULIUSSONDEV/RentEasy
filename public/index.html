<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentEasy - Rental Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Auth pages -->
    <div id="auth-container" class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <span class="logo-icon">🏠</span>
          <h1>RentEasy</h1>
          <p>Online Rental Management System</p>
        </div>
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="showAuthTab('login')">Sign In</button>
          <button class="auth-tab" onclick="showAuthTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Password" required />
          </div>
          <div id="login-error" class="alert alert-error hidden"></div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="reg-email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="reg-phone" placeholder="+1 234 567 8900" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Min. 6 characters" required />
          </div>
          <div class="form-group">
            <label>I am a</label>
            <select id="reg-role" required>
              <option value="">Select role</option>
              <option value="landlord">Landlord / Property Owner</option>
              <option value="tenant">Tenant</option>
            </select>
          </div>
          <div id="reg-error" class="alert alert-error hidden"></div>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-container" class="hidden">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-logo">
          <span class="logo-icon">🏠</span>
          <span>RentEasy</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" onclick="navigate('dashboard')">
            <span class="nav-icon">📊</span> Dashboard
          </a>
          <a href="#" class="nav-item" onclick="navigate('properties')" id="nav-properties">
            <span class="nav-icon">🏢</span> Properties
          </a>
          <a href="#" class="nav-item" onclick="navigate('tenants')" id="nav-tenants">
            <span class="nav-icon">👥</span> Tenants
          </a>
          <a href="#" class="nav-item" onclick="navigate('leases')">
            <span class="nav-icon">📄</span> Leases
          </a>
          <a href="#" class="nav-item" onclick="navigate('payments')">
            <span class="nav-icon">💰</span> Payments
          </a>
          <a href="#" class="nav-item" onclick="navigate('maintenance')">
            <span class="nav-icon">🔧</span> Maintenance
          </a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info">
            <span class="user-avatar" id="user-avatar">U</span>
            <div>
              <div class="user-name" id="sidebar-user-name">Loading...</div>
              <div class="user-role" id="sidebar-user-role"></div>
            </div>
          </div>
          <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
      </aside>

      <!-- Content -->
      <main id="content" class="content">
        <div id="page-dashboard" class="page active"></div>
        <div id="page-properties" class="page"></div>
        <div id="page-tenants" class="page"></div>
        <div id="page-leases" class="page"></div>
        <div id="page-payments" class="page"></div>
        <div id="page-maintenance" class="page"></div>
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/properties.js"></script>
  <script src="/js/tenants.js"></script>
  <script src="/js/leases.js"></script>
  <script src="/js/payments.js"></script>
  <script src="/js/maintenance.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
