<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details - RentEasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="navbar-inner">
        <a href="../index.html" class="navbar-brand">
            <div class="brand-icon">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <span class="brand-name">RentEasy</span>
        </a>
        <div class="navbar-actions" id="navActions">
            <a href="login.html"    class="btn btn-ghost btn-sm">Sign In</a>
            <a href="register.html" class="btn btn-primary btn-sm">Get Started</a>
        </div>
    </div>
</nav>

<main style="padding:2rem 0 4rem;">
    <div class="container">
        <div class="breadcrumb mb-4">
            <span class="breadcrumb-item"><a href="../index.html">Home</a></span>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-item"><a href="properties.html">Properties</a></span>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-item current" id="breadcrumbTitle">Loading...</span>
        </div>

        <div id="propertyDetail">
            <div class="flex-center" style="padding:4rem;">
                <div class="spinner" style="width:2.5rem;height:2.5rem;border-width:3px;"></div>
            </div>
        </div>
    </div>
</main>


<div class="modal-backdrop" id="bookingModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Book This Property</span>
            <button class="modal-close" onclick="closeModal('bookingModal')">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <form id="bookingForm">
            <div class="modal-body">
                <div id="bookingAlert"></div>
                <div class="form-group">
                    <label class="form-label">Start Date <span class="required">*</span></label>
                    <input type="date" id="startDate" class="form-control" required
                        min="" id="startDateInput">
                </div>
                <div class="form-group mt-4">
                    <label class="form-label">Message to Landlord</label>
                    <textarea id="bookingMessage" class="form-control" rows="3"
                        placeholder="Introduce yourself and explain why you're interested..."></textarea>
                </div>
                <div class="alert alert-info mt-4">
                    By submitting this booking request, the landlord will be notified and can approve or reject your request.
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="closeModal('bookingModal')">Cancel</button>
                <button type="submit" class="btn btn-primary" id="submitBookingBtn">Submit Request</button>
            </div>
        </form>
    </div>
</div>


<div class="modal-backdrop" id="messageModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Message Landlord</span>
            <button class="modal-close" onclick="closeModal('messageModal')">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <form id="messageForm">
            <div class="modal-body">
                <div id="messageAlert"></div>
                <div class="form-group">
                    <label class="form-label">Subject</label>
                    <input type="text" id="msgSubject" class="form-control" placeholder="e.g. Question about parking">
                </div>
                <div class="form-group mt-4">
                    <label class="form-label">Message <span class="required">*</span></label>
                    <textarea id="msgBody" class="form-control" rows="4" required
                        placeholder="Type your message here..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="closeModal('messageModal')">Cancel</button>
                <button type="submit" class="btn btn-primary" id="sendMsgBtn">Send Message</button>
            </div>
        </form>
    </div>
</div>

<div class="copyright-bar">&copy; 2025 House Rental Management. All rights reserved.</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/property-detail.js"></script>
</body>
</html>
