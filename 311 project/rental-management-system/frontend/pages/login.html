<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - RentEasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="auth-wrapper">
    
    <div class="auth-left">
        <div style="color:white;text-align:center;max-width:400px;">
            <svg width="80" height="80" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 1.5rem;">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <h2 style="color:white;margin-bottom:0.75rem;">Welcome Back to RentEasy</h2>
            <p style="color:rgba(255,255,255,0.8);">Manage your rental properties, bookings, and payments from one secure platform.</p>
        </div>
    </div>
    
    <div class="auth-right">
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <span class="auth-logo-text">RentEasy</span>
        </div>

        <h1 class="auth-heading">Sign In</h1>
        <p class="auth-subheading">Enter your credentials to access your account</p>

        <div id="alertBox"></div>

        <form class="auth-form" id="loginForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="email">Email Address <span class="required">*</span></label>
                <div class="input-group">
                    <span class="input-icon">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </span>
                    <input type="email" id="email" name="email" class="form-control"
                        placeholder="yourname@email.com" required autocomplete="email">
                </div>
                <span class="form-error hidden" id="emailError"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password <span class="required">*</span></label>
                <div class="input-group has-suffix">
                    <span class="input-icon">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="input-suffix password-toggle" data-target="password" aria-label="Show password" aria-pressed="false">Show</button>
                </div>
                <span class="form-error hidden" id="passwordError"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                Sign In
            </button>
        </form>

        <div class="auth-divider">or</div>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html" class="font-semibold">Create one</a></p>
            <p class="mt-2"><a href="../index.html">Back to Home</a></p>
        </div>
    </div>
</div>

<div class="copyright-bar">&copy; 2025 House Rental Management. All rights reserved.</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script>
    document.querySelectorAll('.password-toggle').forEach((button) => {
        button.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);
            if (!input) return;

            const showPassword = input.type === 'password';
            input.type = showPassword ? 'text' : 'password';
            this.textContent = showPassword ? 'Hide' : 'Show';
            this.setAttribute('aria-pressed', showPassword ? 'true' : 'false');
            this.setAttribute('aria-label', showPassword ? 'Hide password' : 'Show password');
        });
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const alertBox = document.getElementById('alertBox');

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Client-side validation
        if (!email || !password) {
            alertBox.innerHTML = '<div class="alert alert-danger">Please fill in all fields.</div>';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner" style="width:1rem;height:1rem;border-width:2px;"></span> Signing In...';
        alertBox.innerHTML = '';

        try {
            const data = await API.post('/auth/login', { email, password });
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            // Redirect based on role
            const role = data.user.role;
            if (role === 'admin')    window.location.href = 'admin-dashboard.html';
            else if (role === 'landlord') window.location.href = 'landlord-dashboard.html';
            else window.location.href = 'tenant-dashboard.html';
        } catch (err) {
            const isNetworkError = err instanceof TypeError || err.message === 'Failed to fetch';
            const msg = isNetworkError
                ? 'Cannot connect to server. Make sure the backend is running on port 5000.'
                : err.message;
            alertBox.innerHTML = `<div class="alert alert-danger">${msg}</div>`;
            btn.disabled = false;
            btn.innerHTML = 'Sign In';
        }
    });
</script>
</body>
</html>
